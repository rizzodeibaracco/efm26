<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFM 26</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
max-width:600px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.prodotto{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #333;
font-size:20px;
}

button{
font-size:22px;
padding:10px;
width:45px;
}

.qty{
font-size:22px;
margin:0 10px;
min-width:25px;
text-align:center;
}

.box{
margin-top:20px;
padding:15px;
background:#222;
border-radius:10px;
}

input{
font-size:22px;
padding:10px;
width:100%;
margin-top:10px;
}

.big{
font-size:26px;
font-weight:bold;
margin-top:10px;
}

.conferma{
margin-top:20px;
width:100%;
padding:15px;
font-size:22px;
background:orange;
border:none;
}

.reset{
margin-top:10px;
width:100%;
padding:15px;
font-size:20px;
background:red;
border:none;
color:white;
}
</style>

</head>

<body>

<h1>EFM 26</h1>

<div class="prodotto">
Birra 6€
<div>
<button onclick="cambia('birra',-1)">-</button>
<span class="qty" id="q_birra">0</span>
<button onclick="cambia('birra',1)">+</button>
</div>
</div>

<div class="prodotto">
Spritz 6€
<div>
<button onclick="cambia('spritz',-1)">-</button>
<span class="qty" id="q_spritz">0</span>
<button onclick="cambia('spritz',1)">+</button>
</div>
</div>

<div class="prodotto">
Gin tonic 10€
<div>
<button onclick="cambia('gin',-1)">-</button>
<span class="qty" id="q_gin">0</span>
<button onclick="cambia('gin',1)">+</button>
</div>
</div>

<div class="prodotto">
Acqua 2.5€
<div>
<button onclick="cambia('acqua',-1)">-</button>
<span class="qty" id="q_acqua">0</span>
<button onclick="cambia('acqua',1)">+</button>
</div>
</div>


<div class="box">
Totale cliente
<div class="big" id="totale">0 €</div>

Importo dato
<input id="dato" type="number" oninput="calcolaResto()">

Resto
<div class="big" id="resto">0 €</div>
</div>

<button class="conferma" onclick="conferma()">Conferma vendita</button>
<button class="reset" onclick="reset()">Azzera</button>


<script>

prezzi={
birra:6,
spritz:6,
gin:10,
acqua:2.5
}

q={
birra:0,
spritz:0,
gin:0,
acqua:0
}

function cambia(nome,val){
q[nome]+=val

if(q[nome]<0)
q[nome]=0

document.getElementById("q_"+nome).innerHTML=q[nome]

calcolaTotale()
}

function calcolaTotale(){

tot=
q.birra*6+
q.spritz*6+
q.gin*10+
q.acqua*2.5

document.getElementById("totale").innerHTML=tot+" €"

calcolaResto()
}

function calcolaResto(){

dato=document.getElementById("dato").value

if(dato=="")
dato=0

resto=dato-calcolaTotaleReturn()

if(resto<0)
resto=0

document.getElementById("resto").innerHTML=resto+" €"
}

function calcolaTotaleReturn(){
return(
q.birra*6+
q.spritz*6+
q.gin*10+
q.acqua*2.5
)
}

function conferma(){

alert("Vendita registrata")

reset()

}

function reset(){

q={
birra:0,
spritz:0,
gin:0,
acqua:0
}

document.getElementById("dato").value=""

for(i in q){
document.getElementById("q_"+i).innerHTML=0
}

calcolaTotale()

}

</script>

</body>
</html>
